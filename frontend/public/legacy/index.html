<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Legacy HTML (Drop-in)</title>
  <style>
    body{font-family:system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; margin:0; padding:24px;}
    .card{max-width:900px; margin:0 auto; border:1px solid #e5e7eb; border-radius:12px; padding:20px;}
    code{background:#f3f4f6; padding:2px 6px; border-radius:6px;}
  </style>
</head>
<body>
  <div class="card">
    <h1>Legacy HTML placeholder</h1>
    <p>
      Replace this file with your HTML page (or paste your HTML here). The Next.js app will render it at:
      <code>/legacy</code> (embedded via iframe).
    </p>
    <p>
      If your HTML references CSS/JS/images, put them in <code>/public/legacy/</code> and reference them relatively, e.g. <code>./styles.css</code>.
    </p>
  </div>
</body>
</html>
